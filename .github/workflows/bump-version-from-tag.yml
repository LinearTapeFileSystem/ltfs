name: Bump version from tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name in format vX.Y.Z.W or vX.Y.Z.W-suffix'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    name: Update configure version and create PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: v2.4.8-windows-support
          fetch-depth: 0

      - name: Extract version from tag
        id: extract
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [[ "$TAG_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)(-.*)?$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Using version: $VERSION"
          else
            echo "Tag '$TAG_NAME' does not match expected format 'vX.Y.Z.W-...'."
            exit 1
          fi

      - name: Update configure.ac
        id: update
        shell: bash
        run: |
          VERSION="${{ steps.extract.outputs.version }}"

          sed -Ei "s/^(AC_INIT\(\[LTFS\], \[)[^]]+(\], IBM corporation\.\))/\1${VERSION}\2/" configure.ac

          if git diff --quiet -- configure.ac; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change needed in configure.ac"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          base: v2.4.8-windows-support
          branch: automation/bump-version-${{ steps.extract.outputs.version }}
          delete-branch: true
          commit-message: "chore: bump LTFS version to ${{ steps.extract.outputs.version }}"
          title: "chore: bump LTFS version to ${{ steps.extract.outputs.version }}"
          body: |
            Automated version bump from tag `${{ github.ref_name }}`.

            - Parsed version: `${{ steps.extract.outputs.version }}`
            - Updated file: `configure.ac`